<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>byte4lunch — lunch driven effectiveness</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a18'/%3E%3Cpath d='M50 8C26.8 8 8 26.8 8 50S26.8 92 50 92 92 73.2 92 50C92 38.7 87.4 28.4 79.9 21' stroke='%236BBF3E' stroke-width='9' stroke-linecap='round' fill='none'/%3E%3Cpath d='M50 22C33.4 22 20 35.4 20 52S33.4 82 50 82 80 68.6 80 52C80 44 76.8 36.7 71.5 31.4' stroke='%236BBF3E' stroke-width='8' stroke-linecap='round' fill='none'/%3E%3Cpath d='M50 36C41.7 36 35 42.7 35 51S41.7 66 50 66 65 59.3 65 51C65 46.9 63.3 43.2 60.5 40.5' stroke='%236BBF3E' stroke-width='7' stroke-linecap='round' fill='none'/%3E%3Ccircle cx='50' cy='51' r='5.5' fill='%236BBF3E'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--green:#6BBF3E;--green-dark:#4a8a2a;--green-light:#a8d87a;--cream:#f8f5ef;--dark:#1a1a18;--gray:#8a8a80;--border:#e8e4da}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:white;cursor:pointer;text-decoration:none}
.nav-logo svg{width:28px;height:28px}
.nav-actions{display:flex;gap:8px;align-items:center}
.btn{border:none;border-radius:6px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s}
.btn-ghost{background:transparent;color:#aaa}.btn-ghost:hover{color:white}
.btn-primary{background:var(--green);color:white}.btn-primary:hover{background:var(--green-dark)}
.btn-outline{background:transparent;color:var(--green);border:1.5px solid var(--green)}.btn-outline:hover{background:var(--green);color:white}
.btn-danger{background:#e74c3c;color:white}.btn-danger:hover{background:#c0392b}
.btn-sm{padding:5px 10px;font-size:.78rem}
.nav-user{font-size:.8rem;color:var(--green-light);font-family:'Space Mono',monospace}
.page{display:none;animation:fadeIn .3s ease}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero{background:var(--dark);padding:60px 24px 48px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(107,191,62,.15) 0%,transparent 70%);border-radius:50%}
.hero-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.hero-logo-wrap svg{width:90px;height:90px;filter:drop-shadow(0 0 24px rgba(107,191,62,.4))}
.hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,8vw,3.2rem);color:white;letter-spacing:-1px}
.hero h1 span{color:var(--green)}
.payoff{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.hero-search{margin:32px auto 0;max-width:420px;display:flex;gap:8px}
.hero-search input{flex:1;padding:12px 16px;border-radius:8px;border:none;background:rgba(255,255,255,.1);color:white;font-family:'DM Sans',sans-serif;font-size:.95rem}
.hero-search input::placeholder{color:#666}
.hero-search input:focus{outline:1.5px solid var(--green);background:rgba(255,255,255,.15)}
.section{padding:32px 20px;max-width:700px;margin:0 auto}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--dark);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:16px;cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid var(--border)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.12)}
.card-body{padding:16px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;color:var(--dark)}
.card-place{font-size:.8rem;color:var(--gray);margin-top:2px;font-family:'Space Mono',monospace}
.card-score{background:var(--green);color:white;border-radius:8px;padding:4px 10px;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;white-space:nowrap;display:flex;align-items:center;gap:4px}
.card-score.empty{background:#ddd;color:#888}
.tag{font-size:.72rem;padding:3px 9px;border-radius:100px;background:var(--cream);color:var(--gray);font-family:'Space Mono',monospace}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.detail-header{background:var(--dark);padding:28px 20px 24px}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-size:.85rem;cursor:pointer;font-family:'Space Mono',monospace;background:none;border:none;margin-bottom:16px}
.back-btn:hover{color:var(--green-light)}
.detail-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:white;line-height:1.1}
.detail-place{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--gray);margin-top:4px}
.score-card{background:white;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);border:1px solid var(--border);margin-bottom:16px}
.score-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--gray);margin-bottom:14px}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.score-row-label{font-size:.8rem;width:80px;flex-shrink:0;font-family:'Space Mono',monospace;color:var(--dark)}
.score-bar-wrap{flex:1;background:var(--cream);border-radius:4px;height:8px;overflow:hidden}
.score-bar{height:8px;border-radius:4px;background:var(--green);transition:width .5s}
.score-val{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;width:24px;text-align:right}
.bonus-row{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap}
.bonus-chip{display:flex;align-items:center;gap:4px;font-size:.78rem;font-family:'Space Mono',monospace;padding:4px 10px;border-radius:100px}
.bonus-chip.on{background:var(--green);color:white}.bonus-chip.off{background:var(--cream);color:var(--gray)}
.big-score{display:flex;align-items:center;justify-content:center;gap:8px;margin:20px 0}
.big-score-val{font-family:'Syne',sans-serif;font-weight:800;font-size:3rem;color:var(--green);line-height:1}
.big-score-label{font-size:.75rem;color:var(--gray);font-family:'Space Mono',monospace}
.review-card{background:white;border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.review-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.reviewer-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem}
.review-date{font-size:.72rem;color:var(--gray);font-family:'Space Mono',monospace}
.review-text{font-size:.88rem;color:var(--dark);line-height:1.5;font-style:italic}
.form-page{padding:24px 20px;max-width:600px;margin:0 auto}
.form-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:24px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:.8rem;font-family:'Space Mono',monospace;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--dark);transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--green)}
.form-textarea{min-height:90px;resize:vertical}
.checkbox-row{display:flex;align-items:center;gap:10px}
.checkbox-row input{width:18px;height:18px;accent-color:var(--green)}
.glob-picker{display:flex;gap:6px}
.glob-pick{cursor:pointer;opacity:.25;transition:opacity .15s,transform .15s;filter:grayscale(1)}
.glob-pick.active{opacity:1;filter:none;transform:scale(1.05)}
.login-wrap{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:white;border-radius:20px;padding:32px 28px;max-width:380px;width:100%;box-shadow:0 4px 30px rgba(0,0,0,.08);border:1px solid var(--border)}
.login-logo{text-align:center;margin-bottom:24px}
.login-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;text-align:center;margin-bottom:4px}
.login-sub{text-align:center;color:var(--gray);font-size:.85rem;margin-bottom:24px}
.error-msg{background:#ffeaea;color:#c0392b;border-radius:8px;padding:10px 14px;font-size:.85rem;margin-bottom:14px;display:none}
.admin-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.admin-tab{white-space:nowrap;padding:10px 18px;font-family:'Space Mono',monospace;font-size:.8rem;cursor:pointer;border-bottom:2px solid transparent;color:var(--gray);transition:all .2s}
.admin-tab.active{color:var(--green);border-bottom-color:var(--green)}
.admin-table{width:100%;border-collapse:collapse;font-size:.85rem}
.admin-table th{text-align:left;padding:8px 12px;font-family:'Space Mono',monospace;font-size:.7rem;color:var(--gray);background:var(--cream)}
.admin-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.role-badge{font-size:.7rem;padding:2px 8px;border-radius:4px;font-family:'Space Mono',monospace;font-weight:700}
.role-admin{background:#fff3cd;color:#856404}.role-reviewer{background:#d1e7dd;color:#0a5c36}.role-user{background:#e2e3e5;color:#555}
.filter-bar{display:flex;gap:8px;padding:16px 20px;overflow-x:auto;background:white;border-bottom:1px solid var(--border)}
.filter-chip{white-space:nowrap;padding:6px 14px;border-radius:100px;font-size:.78rem;font-family:'Space Mono',monospace;cursor:pointer;border:1.5px solid var(--border);background:white;color:var(--gray);transition:all .2s}
.filter-chip.active{background:var(--green);color:white;border-color:var(--green)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark);color:white;padding:12px 20px;border-radius:10px;font-size:.85rem;font-family:'Space Mono',monospace;transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:48px 20px;color:var(--gray)}.empty p{font-family:'Space Mono',monospace;font-size:.8rem;margin-top:12px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid #ccc;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{text-align:center;padding:40px;color:var(--gray)}
.invite-box{background:#f0faf0;border:1px solid var(--green);border-radius:10px;padding:14px;margin-top:12px;font-size:.82rem;font-family:'Space Mono',monospace;word-break:break-all}
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:6px 4px;background:none;border:none}
.hamburger span{display:block;width:22px;height:2px;background:white;border-radius:2px;transition:all .25s}
@media(max-width:640px){
  .hamburger{display:flex}
  .nav-actions{display:none;position:absolute;top:56px;left:0;right:0;background:var(--dark);flex-direction:column;padding:10px 16px 16px;gap:2px;border-top:1px solid rgba(255,255,255,.1);z-index:99}
  .nav-actions.open{display:flex}
  .nav-actions .btn{width:100%;text-align:left;padding:11px 14px;border-radius:6px}
  .nav-actions .nav-user{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:4px}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" onclick="showPage('home')">
    <svg viewBox="0 0 100 100" fill="none"><path d="M50 5C25.1 5 5 25.1 5 50S25.1 95 50 95 95 74.9 95 50C95 38.1 90.1 27.3 82.2 19.7" stroke="#6BBF3E" stroke-width="10" stroke-linecap="round"/><path d="M50 20C33.4 20 20 33.4 20 50S33.4 80 50 80 80 66.6 80 50C80 41.7 76.6 34.2 71.1 28.8" stroke="#6BBF3E" stroke-width="9" stroke-linecap="round"/><path d="M50 35C41.7 35 35 41.7 35 50S41.7 65 50 65 65 58.3 65 50C65 45.8 63.2 42 60.3 39.3" stroke="#6BBF3E" stroke-width="8" stroke-linecap="round"/><circle cx="50" cy="50" r="6" fill="#6BBF3E"/></svg>
    byte4lunch
  </a>
  <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-actions" id="navActions">
    <span class="nav-user" id="navUser"></span>
    <button class="btn btn-ghost" onclick="showPage('list')" id="navList" style="display:none">Ristoranti</button>
    <button class="btn btn-ghost" onclick="showPage('admin')" id="navAdmin" style="display:none">Admin</button>
    <button class="btn btn-ghost" onclick="showPage('newReview')" id="navReview" style="display:none">+ Recensione</button>
    <button class="btn btn-ghost" onclick="logout()" id="navLogout" style="display:none">Esci</button>
    <button class="btn btn-primary" onclick="showPage('login')" id="navLogin">Accedi</button>
  </div>
</nav>
<div class="toast" id="toast"></div>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="hero">
    <div class="hero-logo-wrap">
      <svg viewBox="0 0 100 100" fill="none" width="90" height="90"><path d="M50 5C25.1 5 5 25.1 5 50S25.1 95 50 95 95 74.9 95 50C95 38.1 90.1 27.3 82.2 19.7" stroke="#6BBF3E" stroke-width="10" stroke-linecap="round"/><path d="M50 20C33.4 20 20 33.4 20 50S33.4 80 50 80 80 66.6 80 50C80 41.7 76.6 34.2 71.1 28.8" stroke="#6BBF3E" stroke-width="9" stroke-linecap="round"/><path d="M50 35C41.7 35 35 41.7 35 50S41.7 65 50 65 65 58.3 65 50C65 45.8 63.2 42 60.3 39.3" stroke="#6BBF3E" stroke-width="8" stroke-linecap="round"/><circle cx="50" cy="50" r="6" fill="#6BBF3E"/></svg>
      <div><h1><span>byte</span>4lunch</h1><p class="payoff">lunch driven effectiveness</p></div>
    </div>
    <div class="hero-search">
      <input type="text" id="heroSearch" placeholder="Cerca luogo o ristorante..." oninput="debounceSearch()" onkeydown="if(event.key==='Enter')goSearch()">
      <button class="btn btn-primary" onclick="goSearch()">Cerca</button>
    </div>
    <div style="margin-top:12px">
      <button class="btn btn-outline" id="nearMeBtn" onclick="enableNearMe()" style="font-size:.78rem;padding:7px 16px;border-color:rgba(107,191,62,.5);color:var(--green-light)">📍 Vicino a me</button>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Ultime recensioni</div>
    <div id="homeLatest"><div class="loading-wrap"><div class="spinner"></div></div></div>
    <button class="btn btn-outline" style="width:100%;margin-top:8px" onclick="showPage('list')">Vedi tutti i ristoranti →</button>
  </div>
</div>

<!-- LIST -->
<div class="page" id="page-list">
  <div class="filter-bar" id="filterBar"></div>
  <div class="section">
    <div class="section-title">Tutti i ristoranti</div>
    <div id="listCards"><div class="loading-wrap"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- DETAIL -->
<div class="page" id="page-detail">
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">← Indietro</button>
    <div class="detail-name" id="detailName"></div>
    <div class="detail-place" id="detailPlace"></div>
  </div>
  <div class="section" id="detailContent"></div>
</div>

<!-- NEW REVIEW -->
<div class="page" id="page-newReview">
  <div class="form-page">
    <div class="form-title">Nuova recensione</div>
    <div class="form-group"><label class="form-label">Ristorante esistente</label><select class="form-select" id="rvRistorante" onchange="onRestaurantSelect()"><option value="">Seleziona...</option></select></div>
    <div class="form-group">
      <label class="form-label">— oppure aggiungi nuovo ristorante —</label>
      <input class="form-input" id="rvNewName" placeholder="Nome ristorante">
      <input class="form-input" style="margin-top:8px" id="rvNewPlace" placeholder="Luogo / città">
    </div>
    <div class="form-group">
      <label class="form-label">Indirizzo <span style="font-size:.7rem;font-weight:400;text-transform:none;letter-spacing:0">(viene salvato nel ristorante)</span></label>
      <input class="form-input" id="rvAddress" placeholder="Via Roma 12, Città">
    </div>
    <div class="form-group">
      <label class="form-label">Telefono <span style="font-size:.7rem;font-weight:400;text-transform:none;letter-spacing:0">(viene salvato nel ristorante)</span></label>
      <input class="form-input" id="rvPhone" placeholder="+39 041 123456" type="tel">
    </div>
    <div class="form-group"><label class="form-label">Data visita</label><input class="form-input" type="date" id="rvDate"></div>
    <div class="form-group"><label class="form-label">Qualità cibo (1-5 globi)</label><div class="glob-picker" id="pickQualita" data-field="qualita"></div></div>
    <div class="form-group"><label class="form-label">Velocità servizio (1-5 globi)</label><div class="glob-picker" id="pickVelocita" data-field="velocita"></div></div>
    <div class="form-group"><label class="form-label">Rapporto qualità/prezzo (1-5 globi)</label><div class="glob-picker" id="pickPrezzo" data-field="prezzo"></div></div>
    <div class="form-group">
      <label class="form-label">Bonus</label>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <label class="checkbox-row"><input type="checkbox" id="rvSimpatia"> <span>😄 Simpatia del personale</span></label>
        <label class="checkbox-row"><input type="checkbox" id="rvCaffe"> <span>☕ Caffè incluso / ottimo</span></label>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Nota / commento</label><textarea class="form-textarea" id="rvNota" placeholder="Com'era? Torneresti?"></textarea></div>
    <div class="error-msg" id="rvError"></div>
    <button class="btn btn-primary" style="width:100%;padding:13px" id="rvSubmit" onclick="submitReview()">Pubblica recensione</button>
  </div>
</div>

<!-- LOGIN -->
<div class="page" id="page-login">
  <div class="login-wrap"><div class="login-box">
    <div class="login-logo"><svg viewBox="0 0 100 100" fill="none" width="56"><path d="M50 5C25.1 5 5 25.1 5 50S25.1 95 50 95 95 74.9 95 50C95 38.1 90.1 27.3 82.2 19.7" stroke="#6BBF3E" stroke-width="10" stroke-linecap="round"/><path d="M50 20C33.4 20 20 33.4 20 50S33.4 80 50 80 80 66.6 80 50C80 41.7 76.6 34.2 71.1 28.8" stroke="#6BBF3E" stroke-width="9" stroke-linecap="round"/><path d="M50 35C41.7 35 35 41.7 35 50S41.7 65 50 65 65 58.3 65 50C65 45.8 63.2 42 60.3 39.3" stroke="#6BBF3E" stroke-width="8" stroke-linecap="round"/><circle cx="50" cy="50" r="6" fill="#6BBF3E"/></svg></div>
    <div id="loginPanel">
      <div class="login-title">byte4lunch</div><div class="login-sub">Accedi con il tuo account</div>
      <div class="error-msg" id="loginError"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="loginEmail" placeholder="nome@omega.it" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="loginPwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-primary" style="width:100%;padding:12px;font-size:1rem;margin-top:4px" id="loginBtn" onclick="doLogin()">Accedi</button>
      <p style="text-align:center;margin-top:14px;font-size:.78rem;color:var(--gray);font-family:'Space Mono',monospace;cursor:pointer" onclick="showRegister()">Hai un codice invito? Registrati →</p>
    </div>
    <div id="registerPanel" style="display:none">
      <div class="login-title">Registrati</div><div class="login-sub">Usa il tuo codice invito</div>
      <div class="error-msg" id="regError"></div>
      <div class="form-group"><label class="form-label">Nome completo</label><input class="form-input" id="regName" placeholder="Mario Rossi"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="regEmail" placeholder="nome@omega.it"></div>
      <div class="form-group"><label class="form-label">Password (min. 8 caratteri)</label><input class="form-input" type="password" id="regPwd" placeholder="••••••••"></div>
      <div class="form-group"><label class="form-label">Codice invito</label><input class="form-input" id="regToken" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"></div>
      <button class="btn btn-primary" style="width:100%;padding:12px;font-size:1rem;margin-top:4px" id="regBtn" onclick="doRegister()">Crea account</button>
      <p style="text-align:center;margin-top:14px;font-size:.78rem;color:var(--gray);font-family:'Space Mono',monospace;cursor:pointer" onclick="showLogin()">← Torna al login</p>
    </div>
  </div></div>
</div>

<!-- ADMIN -->
<div class="page" id="page-admin">
  <div class="form-page">
    <div class="form-title">Pannello amministratore</div>
    <div class="admin-tabs">
      <div class="admin-tab active" onclick="adminTab('users',this)">Utenti</div>
      <div class="admin-tab" onclick="adminTab('invites',this)">Inviti</div>
      <div class="admin-tab" onclick="adminTab('reviews',this)">Recensioni</div>
      <div class="admin-tab" onclick="adminTab('restaurants',this)">Ristoranti</div>
    </div>
    <div id="adminContent"></div>
  </div>
</div>

<script>
const API='/api';
let currentUser=null,currentToken=null,currentDetailId=null,prevPage='home',currentFilter='all',currentAdminTab='users';
let reviewScores={qualita:0,velocita:0,prezzo:0};
let userCoords=null,nearMeMode=false,geocodeCache={},searchDebounceTimer=null;

// ── Geolocalizzazione ─────────────────────────────────────
function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
async function geocodePlace(place){
  if(geocodeCache[place])return geocodeCache[place];
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(place+', Italy')}&format=json&limit=1`,{headers:{'User-Agent':'byte4lunch/1.0'}});
    const d=await r.json();
    if(d.length){const c={lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon)};geocodeCache[place]=c;return c;}
  }catch{}
  return null;
}
function fmtDist(km){return km<1?(Math.round(km*1000)+'m'):(km.toFixed(1)+'km');}
function enableNearMe(){
  if(!navigator.geolocation){toast('Geolocalizzazione non supportata dal browser');return;}
  const btn=document.getElementById('nearMeBtn');btn.textContent='📍 Rilevamento…';btn.disabled=true;
  navigator.geolocation.getCurrentPosition(async pos=>{
    userCoords={lat:pos.coords.latitude,lon:pos.coords.longitude};
    nearMeMode=true;currentFilter='all';
    btn.textContent='📍 Vicino a me ✓';btn.disabled=false;
    await renderList();
    toast('📍 Ristoranti ordinati per distanza');
  },()=>{
    btn.textContent='📍 Vicino a me';btn.disabled=false;
    toast('Impossibile rilevare la posizione. Controlla i permessi.');
  },{timeout:8000});
}
function disableNearMe(){nearMeMode=false;const btn=document.getElementById('nearMeBtn');if(btn)btn.textContent='📍 Vicino a me';}
function debounceSearch(){clearTimeout(searchDebounceTimer);searchDebounceTimer=setTimeout(()=>{if(document.querySelector('#page-list.active'))renderList();},400);}

function saveSession(t,u){currentToken=t;currentUser=u;sessionStorage.setItem('b4l_t',t);sessionStorage.setItem('b4l_u',JSON.stringify(u));}
function clearSession(){currentToken=null;currentUser=null;sessionStorage.removeItem('b4l_t');sessionStorage.removeItem('b4l_u');}
function loadSession(){const t=sessionStorage.getItem('b4l_t'),u=sessionStorage.getItem('b4l_u');if(t&&u){currentToken=t;currentUser=JSON.parse(u);}}

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(currentToken)opts.headers['Authorization']='Bearer '+currentToken;
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(API+path,opts);
  const data=await res.json();
  if(!res.ok)throw new Error(data.error||'Errore server');
  return data;
}

function globo(size,active){const c=active?'#6BBF3E':'#d0d0c8';return`<svg width="${size}" height="${size}" viewBox="0 0 100 100" fill="none"><path d="M50 5C25.1 5 5 25.1 5 50S25.1 95 50 95 95 74.9 95 50C95 38.1 90.1 27.3 82.2 19.7" stroke="${c}" stroke-width="10" stroke-linecap="round"/><path d="M50 20C33.4 20 20 33.4 20 50S33.4 80 50 80 80 66.6 80 50C80 41.7 76.6 34.2 71.1 28.8" stroke="${c}" stroke-width="9" stroke-linecap="round"/><path d="M50 35C41.7 35 35 41.7 35 50S41.7 65 50 65 65 58.3 65 50C65 45.8 63.2 42 60.3 39.3" stroke="${c}" stroke-width="8" stroke-linecap="round"/><circle cx="50" cy="50" r="6" fill="${c}"/></svg>`;}
function renderGlobi(score,size){let h='';for(let i=1;i<=5;i++)h+=globo(size,i<=score);return h;}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  window.scrollTo(0,0);
  document.getElementById('navActions').classList.remove('open');
  if(name==='home')renderHome();
  if(name==='list')renderList();
  if(name==='newReview')renderNewReview();
  if(name==='admin'){currentAdminTab='users';document.querySelectorAll('.admin-tab').forEach((t,i)=>t.classList.toggle('active',i===0));renderAdmin();}
  if(name==='login'){showLogin();checkInviteParam();}
}
function goBack(){showPage(prevPage||'list');}
function toggleMenu(){document.getElementById('navActions').classList.toggle('open');}
async function onRestaurantSelect(){
  const rid=parseInt(document.getElementById('rvRistorante').value);
  if(!rid){document.getElementById('rvAddress').value='';document.getElementById('rvPhone').value='';return;}
  try{const r=await api('GET','/restaurants/'+rid);document.getElementById('rvAddress').value=r.address||'';document.getElementById('rvPhone').value=r.phone||'';}catch{}
}

async function renderHome(){
  try{
    const data=await api('GET','/restaurants');
    const latest=data.slice(0,2);
    document.getElementById('homeLatest').innerHTML=latest.length?latest.map(r=>card(r)).join(''):'<div class="empty"><p>Nessuna recensione ancora</p></div>';
  }catch{document.getElementById('homeLatest').innerHTML='<div class="empty"><p>Errore caricamento</p></div>';}
}
function goSearch(){showPage('list');}

async function renderList(){
  document.getElementById('listCards').innerHTML='<div class="loading-wrap"><div class="spinner"></div></div>';
  try{
    const places=await api('GET','/restaurants/places');
    const fb=document.getElementById('filterBar');
    const nearChip=`<div class="filter-chip ${nearMeMode?'active':''}" onclick="enableNearMe()" title="Ordina per distanza dalla tua posizione">📍 Vicino a me</div>`;
    fb.innerHTML=nearChip+['Tutti',...places].map((p,i)=>{const v=i===0?'all':p;return`<div class="filter-chip ${!nearMeMode&&currentFilter===v?'active':''}" onclick="setFilter('${v}',this)">${p}</div>`;}).join('');
    const q=document.getElementById('heroSearch').value.trim();
    let url='/restaurants';const ps=[];
    if(q)ps.push('q='+encodeURIComponent(q));
    if(!nearMeMode&&currentFilter!=='all')ps.push('place='+encodeURIComponent(currentFilter));
    if(ps.length)url+='?'+ps.join('&');
    let data=await api('GET',url);
    if(nearMeMode&&userCoords){
      // Geocodifica i luoghi e aggiungi distanza
      const geoData=await Promise.all(data.map(async r=>{
        const place=r.address||r.place;
        const coords=await geocodePlace(place);
        const dist=coords?haversine(userCoords.lat,userCoords.lon,coords.lat,coords.lon):null;
        return{...r,_dist:dist};
      }));
      geoData.sort((a,b)=>{
        if(a._dist==null&&b._dist==null)return 0;
        if(a._dist==null)return 1;if(b._dist==null)return-1;
        return a._dist-b._dist;
      });
      document.getElementById('listCards').innerHTML=geoData.length?geoData.map(r=>card(r,r._dist)).join(''):'<div class="empty"><p>Nessun ristorante trovato</p></div>';
    }else{
      document.getElementById('listCards').innerHTML=data.length?data.map(r=>card(r)).join(''):'<div class="empty"><p>Nessun ristorante trovato</p></div>';
    }
  }catch(e){document.getElementById('listCards').innerHTML='<div class="empty"><p>Errore</p></div>';}
}
function setFilter(p,el){disableNearMe();currentFilter=p;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderList();}

function card(r,dist){const tags=(r.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const distBadge=dist!=null?`<span class="tag" style="background:rgba(107,191,62,.12);color:var(--green-dark);font-weight:600">📍 ${fmtDist(dist)}</span>`:'';
  return`<div class="card" onclick="openDetail(${r.id})"><div class="card-body">
    <div class="card-top"><div><div class="card-name">${esc(r.name)}</div><div class="card-place">📍 ${esc(r.place)}</div></div>
    ${r.avg_score?`<div class="card-score">${r.avg_score} ${globo(18,true)}</div>`:`<div class="card-score empty">—</div>`}</div>
    <div class="card-tags">${distBadge}${tags}</div>
    <div style="margin-top:10px;font-size:.75rem;color:var(--gray);font-family:'Space Mono',monospace">${r.review_count} recension${r.review_count===1?'e':'i'}</div>
  </div></div>`;}

async function openDetail(id){
  prevPage=document.querySelector('.page.active')?.id?.replace('page-','')||'list';
  currentDetailId=id;
  document.getElementById('detailName').textContent='…';
  document.getElementById('detailPlace').textContent='';
  document.getElementById('detailContent').innerHTML='<div class="loading-wrap"><div class="spinner"></div></div>';
  showPage('detail');
  try{
    const r=await api('GET','/restaurants/'+id);
    document.getElementById('detailName').textContent=r.name;
    document.getElementById('detailPlace').textContent=`📍 ${r.place}${r.address?', '+r.address:''}`;
    // Telefono + link mappe
    const mapsQuery=encodeURIComponent(`${r.name} ${r.address||''} ${r.place}`);
    const googleUrl=`https://www.google.com/maps/search/?api=1&query=${mapsQuery}`;
    const appleUrl=`https://maps.apple.com/?q=${mapsQuery}`;
    let html=`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">`;
    if(r.phone)html+=`<a href="tel:${esc(r.phone)}" class="btn btn-outline btn-sm" style="text-decoration:none">📞 ${esc(r.phone)}</a>`;
    html+=`<a href="${googleUrl}" target="_blank" rel="noopener" class="btn btn-outline btn-sm" style="text-decoration:none">🗺 Google Maps</a>`;
    html+=`<a href="${appleUrl}" target="_blank" rel="noopener" class="btn btn-outline btn-sm" style="text-decoration:none">🍎 Apple Maps</a>`;
    html+=`</div>`;
    if(r.review_count>0){
      html+=`<div class="score-card">
        <div class="big-score">${globo(44,true)}<div><div class="big-score-val">${r.avg_score}</div><div class="big-score-label">punteggio globi</div></div></div>
        <div class="score-title">Media di ${r.review_count} recension${r.review_count===1?'e':'i'}</div>
        ${srow('Qualità',r.avg_qualita)}${srow('Velocità',r.avg_velocita)}${srow('Prezzo',r.avg_prezzo)}
        <div class="bonus-row">
          <div class="bonus-chip ${r.tot_simpatia>0?'on':'off'}">😄 Simpatia${r.tot_simpatia>0?' ('+r.tot_simpatia+'/'+r.review_count+')':''}</div>
          <div class="bonus-chip ${r.tot_caffe>0?'on':'off'}">☕ Caffè${r.tot_caffe>0?' ('+r.tot_caffe+'/'+r.review_count+')':''}</div>
        </div></div>`;
      html+=`<div class="section-title" style="margin-top:24px">Recensioni</div>`;
      r.reviews.forEach(rv=>{
        const canDel=currentUser&&(currentUser.role==='admin'||currentUser.id===rv.user_id);
        html+=`<div class="review-card">
          <div class="review-meta"><span class="reviewer-name">${esc(rv.reviewer_name)}</span><span class="review-date">${rv.visit_date}</span></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
            <div style="display:flex;flex-direction:column;align-items:center;gap:2px">${renderGlobi(rv.qualita,16)}<div style="font-size:.6rem;color:var(--gray);font-family:'Space Mono',monospace">Qualità</div></div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:2px">${renderGlobi(rv.velocita,16)}<div style="font-size:.6rem;color:var(--gray);font-family:'Space Mono',monospace">Velocità</div></div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:2px">${renderGlobi(rv.prezzo,16)}<div style="font-size:.6rem;color:var(--gray);font-family:'Space Mono',monospace">Prezzo</div></div>
            <div style="margin-left:auto;font-family:'Syne',sans-serif;font-weight:800;color:var(--green);font-size:1.1rem">${rv.score} ●</div>
          </div>
          ${rv.note?`<div class="review-text">"${esc(rv.note)}"</div>`:''}
          <div class="bonus-row" style="margin-top:8px">${rv.bonus_simpatia?'<div class="bonus-chip on">😄 Simpatia</div>':''}${rv.bonus_caffe?'<div class="bonus-chip on">☕ Caffè</div>':''}</div>
          ${canDel?`<button class="btn btn-danger btn-sm" style="margin-top:10px" onclick="deleteReview(${rv.id})">Elimina</button>`:''}
        </div>`;});
    }else{html='<div class="empty"><p>Nessuna recensione ancora.<br>Sii il primo!</p></div>';}
    if(currentUser&&['admin','reviewer'].includes(currentUser.role))html+=`<button class="btn btn-primary" style="width:100%;padding:13px;margin-top:16px" onclick="goReviewThis(${id})">+ Aggiungi recensione</button>`;
    document.getElementById('detailContent').innerHTML=html;
  }catch{document.getElementById('detailContent').innerHTML='<div class="empty"><p>Errore caricamento</p></div>';}
}
function srow(label,val){const v=val||0;const pct=(v/5*100).toFixed(0);return`<div class="score-row"><span class="score-row-label">${label}</span><div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div><span class="score-val">${v}</span></div>`;}

async function deleteReview(rid){if(!confirm('Eliminare?'))return;try{await api('DELETE','/reviews/'+rid);toast('Eliminata');openDetail(currentDetailId);}catch(e){toast('Errore: '+e.message);}}
function goReviewThis(rid){showPage('newReview');setTimeout(()=>{document.getElementById('rvRistorante').value=rid;},100);}

async function renderNewReview(){
  reviewScores={qualita:0,velocita:0,prezzo:0};
  document.getElementById('rvDate').value=new Date().toISOString().split('T')[0];
  ['rvNota','rvNewName','rvNewPlace','rvAddress','rvPhone'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('rvSimpatia').checked=false;document.getElementById('rvCaffe').checked=false;
  document.getElementById('rvError').style.display='none';
  try{const rests=await api('GET','/restaurants');const sel=document.getElementById('rvRistorante');
    sel.innerHTML='<option value="">Seleziona un ristorante esistente...</option>'+rests.map(r=>`<option value="${r.id}">${esc(r.name)} — ${esc(r.place)}</option>`).join('');}catch{}
  ['pickQualita','pickVelocita','pickPrezzo'].forEach(pid=>{
    const el=document.getElementById(pid);const field=el.dataset.field;el.innerHTML='';
    for(let i=1;i<=5;i++){const s=document.createElement('span');s.className='glob-pick';s.innerHTML=globo(32,false);s.dataset.val=i;s.onclick=()=>setGlob(field,i);el.appendChild(s);}
  });
}
function setGlob(field,val){reviewScores[field]=val;const pid='pick'+field.charAt(0).toUpperCase()+field.slice(1);
  document.querySelectorAll(`#${pid} .glob-pick`).forEach((el,i)=>{el.classList.toggle('active',i<val);el.innerHTML=globo(32,i<val);});}

async function submitReview(){
  const errEl=document.getElementById('rvError');errEl.style.display='none';
  let rid=parseInt(document.getElementById('rvRistorante').value);
  const newName=document.getElementById('rvNewName').value.trim();
  if(!rid&&!newName){errEl.textContent='Seleziona o inserisci un ristorante';errEl.style.display='block';return;}
  if(!reviewScores.qualita||!reviewScores.velocita||!reviewScores.prezzo){errEl.textContent='Assegna i globi per tutti i criteri';errEl.style.display='block';return;}
  const btn=document.getElementById('rvSubmit');btn.disabled=true;btn.textContent='Invio…';
  const rvAddr=document.getElementById('rvAddress').value.trim();
  const rvPh=document.getElementById('rvPhone').value.trim();
  try{
    if(!rid&&newName){const rest=await api('POST','/restaurants',{name:newName,place:document.getElementById('rvNewPlace').value.trim()||'—',address:rvAddr||null,phone:rvPh||null,tags:['menu fisso']});rid=rest.id;}
    else if(rid&&(rvAddr||rvPh)){try{await api('PATCH','/restaurants/'+rid,{...(rvAddr&&{address:rvAddr}),...(rvPh&&{phone:rvPh})});}catch{}}
    await api('POST','/reviews',{restaurant_id:rid,visit_date:document.getElementById('rvDate').value,qualita:reviewScores.qualita,velocita:reviewScores.velocita,prezzo:reviewScores.prezzo,bonus_simpatia:document.getElementById('rvSimpatia').checked,bonus_caffe:document.getElementById('rvCaffe').checked,note:document.getElementById('rvNota').value.trim()});
    toast('Recensione pubblicata! 🎉');openDetail(rid);
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Pubblica recensione';}
}

function showLogin(){document.getElementById('loginPanel').style.display='';document.getElementById('registerPanel').style.display='none';document.getElementById('loginError').style.display='none';}
function showRegister(){document.getElementById('loginPanel').style.display='none';document.getElementById('registerPanel').style.display='';document.getElementById('regError').style.display='none';}
function checkInviteParam(){const p=new URLSearchParams(window.location.search);const inv=p.get('invite');if(inv){showRegister();document.getElementById('regToken').value=inv;}}

async function doLogin(){
  const errEl=document.getElementById('loginError');errEl.style.display='none';
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='Accesso…';
  try{const data=await api('POST','/auth/login',{email:document.getElementById('loginEmail').value,password:document.getElementById('loginPwd').value});saveSession(data.token,data.user);updateNav();toast('Bentornato, '+data.user.name+'! 👋');showPage('home');}
  catch(e){errEl.textContent=e.message;errEl.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Accedi';}
}
async function doRegister(){
  const errEl=document.getElementById('regError');errEl.style.display='none';
  const btn=document.getElementById('regBtn');btn.disabled=true;btn.textContent='Registrazione…';
  try{const data=await api('POST','/auth/register',{name:document.getElementById('regName').value,email:document.getElementById('regEmail').value,password:document.getElementById('regPwd').value,invite_token:document.getElementById('regToken').value});saveSession(data.token,data.user);updateNav();toast('Benvenuto, '+data.user.name+'! 🎉');showPage('home');history.replaceState({},'','/');}
  catch(e){errEl.textContent=e.message;errEl.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Crea account';}
}
function logout(){clearSession();updateNav();toast('Logout effettuato');showPage('home');}
function updateNav(){const li=!!currentUser;document.getElementById('navLogin').style.display=li?'none':'';document.getElementById('navLogout').style.display=li?'':'none';document.getElementById('navList').style.display=li?'':'none';document.getElementById('navUser').textContent=li?currentUser.name:'';document.getElementById('navReview').style.display=li&&['admin','reviewer'].includes(currentUser.role)?'':'none';document.getElementById('navAdmin').style.display=li&&currentUser.role==='admin'?'':'none';}

function adminTab(tab,el){document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');currentAdminTab=tab;renderAdmin();}
async function renderAdmin(){
  if(!currentUser||currentUser.role!=='admin')return;
  const el=document.getElementById('adminContent');el.innerHTML='<div class="loading-wrap"><div class="spinner"></div></div>';
  try{
    if(currentAdminTab==='users'){
      const users=await api('GET','/users');
      el.innerHTML=`<div style="margin-bottom:20px"><div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:10px">Crea utente</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input class="form-input" id="adUN" placeholder="Nome" style="flex:2;min-width:120px">
          <input class="form-input" id="adUE" placeholder="Email" style="flex:2;min-width:160px">
          <input class="form-input" type="password" id="adUP" placeholder="Password" style="flex:1;min-width:120px">
          <select class="form-select" id="adUR" style="flex:1;min-width:100px"><option value="user">user</option><option value="reviewer">reviewer</option><option value="admin">admin</option></select>
          <button class="btn btn-primary" onclick="adminCreateUser()">Crea</button>
        </div></div>
        <div style="overflow-x:auto"><table class="admin-table"><tr><th>Nome</th><th>Email</th><th>Ruolo</th><th>Stato</th><th>Ultimo accesso</th><th>Azioni</th></tr>
        ${users.map(u=>`<tr><td>${esc(u.name)}</td><td style="font-size:.8rem">${esc(u.email)}</td>
          <td><span class="role-badge role-${u.role}">${u.role}</span></td>
          <td><span style="color:${u.active?'var(--green)':'#ccc'}">${u.active?'Attivo':'Disattivo'}</span></td>
          <td style="font-size:.72rem;color:var(--gray)">${u.last_login?u.last_login.slice(0,16):'—'}</td>
          <td><div style="display:flex;gap:6px;flex-wrap:wrap">
            <select onchange="adminChangeRole(${u.id},this.value)" style="font-size:.75rem;padding:3px;border:1px solid #ddd;border-radius:4px">${['admin','reviewer','user'].map(r=>`<option value="${r}"${u.role===r?' selected':''}>${r}</option>`).join('')}</select>
            <button class="btn btn-sm ${u.active?'btn-danger':'btn-outline'}" onclick="adminToggleActive(${u.id},${u.active?0:1})">${u.active?'Disattiva':'Attiva'}</button>
          </div></td></tr>`).join('')}
        </table></div>`;
    }else if(currentAdminTab==='invites'){
      const invites=await api('GET','/auth/invites');
      el.innerHTML=`<div style="margin-bottom:20px"><div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:10px">Genera invito</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input class="form-input" id="invE" placeholder="Email destinatario (opzionale)" style="flex:2;min-width:200px">
          <select class="form-select" id="invR" style="flex:1;min-width:120px"><option value="reviewer">reviewer</option><option value="user">user</option><option value="admin">admin</option></select>
          <button class="btn btn-primary" onclick="adminCreateInvite()">Genera link</button>
        </div><div id="inviteResult"></div></div>
        <div style="overflow-x:auto"><table class="admin-table"><tr><th>Token</th><th>Ruolo</th><th>Email</th><th>Creato da</th><th>Usato</th><th>Scade</th></tr>
        ${invites.map(i=>`<tr><td style="font-size:.7rem;font-family:'Space Mono',monospace">${i.token.slice(0,8)}…</td>
          <td><span class="role-badge role-${i.role}">${i.role}</span></td>
          <td style="font-size:.8rem">${i.email||'—'}</td><td style="font-size:.8rem">${esc(i.created_by_name||'—')}</td>
          <td>${i.used_at?'✅ '+i.used_at.slice(0,10):'⏳ No'}</td>
          <td style="font-size:.72rem;color:var(--gray)">${i.expires_at.slice(0,10)}</td></tr>`).join('')}
        </table></div>`;
    }else if(currentAdminTab==='reviews'){
      const reviews=await api('GET','/reviews');
      el.innerHTML=`<div style="overflow-x:auto"><table class="admin-table"><tr><th>Data</th><th>Ristorante</th><th>Recensore</th><th>Score</th><th></th></tr>
        ${reviews.map(r=>`<tr><td>${r.visit_date}</td><td>${esc(r.restaurant_name)}</td><td>${esc(r.reviewer_name)}</td>
          <td style="font-family:'Syne',sans-serif;font-weight:700;color:var(--green)">${r.score}</td>
          <td><button class="btn btn-danger btn-sm" onclick="adminDeleteReview(${r.id})">Elimina</button></td></tr>`).join('')}
        </table></div>`;
    }else{
      const rests=await api('GET','/restaurants');
      el.innerHTML=`<div style="margin-bottom:20px"><div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:10px">Aggiungi ristorante</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input class="form-input" id="adRN" placeholder="Nome" style="flex:2;min-width:140px">
          <input class="form-input" id="adRP" placeholder="Luogo" style="flex:1;min-width:120px">
          <input class="form-input" id="adRPh" placeholder="Telefono" type="tel" style="flex:1;min-width:120px">
          <button class="btn btn-primary" onclick="adminAddRest()">Aggiungi</button>
        </div></div>
        <div style="overflow-x:auto"><table class="admin-table"><tr><th>Nome</th><th>Luogo</th><th>Telefono</th><th>Recensioni</th><th></th></tr>
        ${rests.map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.place)}</td><td style="font-size:.8rem">${r.phone?`<a href="tel:${esc(r.phone)}">${esc(r.phone)}</a>`:'—'}</td><td>${r.review_count}</td>
          <td><button class="btn btn-danger btn-sm" onclick="adminDeleteRest(${r.id})">Rimuovi</button></td></tr>`).join('')}
        </table></div>`;
    }
  }catch(e){el.innerHTML=`<div class="empty"><p>Errore: ${e.message}</p></div>`;}
}

async function adminChangeRole(uid,role){try{await api('PUT','/users/'+uid+'/role',{role});toast('Ruolo aggiornato');renderAdmin();}catch(e){toast('Errore: '+e.message);}}
async function adminToggleActive(uid,active){try{await api('PUT','/users/'+uid+'/active',{active});renderAdmin();}catch(e){toast('Errore: '+e.message);}}
async function adminCreateUser(){try{await api('POST','/users',{name:document.getElementById('adUN').value,email:document.getElementById('adUE').value,password:document.getElementById('adUP').value,role:document.getElementById('adUR').value});toast('Utente creato!');renderAdmin();}catch(e){toast('Errore: '+e.message);}}
async function adminCreateInvite(){try{const data=await api('POST','/auth/invites',{email:document.getElementById('invE').value.trim()||null,role:document.getElementById('invR').value});document.getElementById('inviteResult').innerHTML=`<div class="invite-box"><strong>Link:</strong><br>${data.link}<br><br><strong>Token:</strong> ${data.token}<br><strong>Scade:</strong> ${data.expires_at.slice(0,10)}</div>`;renderAdmin();}catch(e){toast('Errore: '+e.message);}}
async function adminDeleteReview(rid){if(!confirm('Eliminare?'))return;try{await api('DELETE','/reviews/'+rid);renderAdmin();toast('Eliminata');}catch(e){toast('Errore: '+e.message);}}
async function adminDeleteRest(rid){if(!confirm('Rimuovere?'))return;try{await api('DELETE','/restaurants/'+rid);renderAdmin();toast('Rimosso');}catch(e){toast('Errore: '+e.message);}}
async function adminAddRest(){const n=document.getElementById('adRN').value.trim(),p=document.getElementById('adRP').value.trim(),ph=document.getElementById('adRPh').value.trim();if(!n||!p)return;try{await api('POST','/restaurants',{name:n,place:p,phone:ph||null,tags:['menu fisso']});renderAdmin();toast('Aggiunto!');}catch(e){toast('Errore: '+e.message);}}

loadSession();updateNav();renderHome();
</script>
</body>
</html>
